name: Update CHANGELOG
on:
  push:
    branches: [ main, master ]

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate CHANGELOG
        uses: charmbracelet/action-changelog@master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

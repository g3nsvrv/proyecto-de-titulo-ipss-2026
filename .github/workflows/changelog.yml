name: Update CHANGELOG

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate CHANGELOG from all commits
        run: |
          echo "# Changelog" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "Actualizado automáticamente con todos los commits del repositorio." >> CHANGELOG.md
          echo "" >> CHANGELOG.md

          git log --reverse --pretty=format:"- %ad - %h - %s (%an)" --date=short >> CHANGELOG.md

      - name: Commit CHANGELOG
        run: |
          git config user.name "auto-changelog[bot]"
          git config user.email "auto-changelog[bot]@users.noreply.github.com"

          git add CHANGELOG.md

          if git diff --cached --quiet; then
            echo "No hay cambios en CHANGELOG.md"
          else
            git commit -m "docs: update changelog [skip ci]"
            git push
          fi
